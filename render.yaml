services:
  - type: web
    name: aviator-auto-script
    env: node
    plan: free
    buildCommand: |
      PLAYWRIGHT_BROWSERS_PATH=/opt/render/.cache/ms-playwright npm install &&
      PLAYWRIGHT_BROWSERS_PATH=/opt/render/.cache/ms-playwright npx playwright install chromium
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/.cache/ms-playwright
      - key: PORT
        value: 3000
